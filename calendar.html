<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lynote — 年度推广执行日历</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f8f6; color: #1a1a1a; padding: 24px; max-width: 900px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 24px; }
  .period-row { border: 1px solid #e8e8e8; border-radius: 10px; margin-bottom: 10px; overflow: hidden; background: #fff; }
  .period-row.highlight { border: 2px solid #534AB7; }
  .period-header { display: grid; grid-template-columns: 170px 1fr 150px; cursor: pointer; align-items: stretch; }
  .ph-time { background: #f8f8f6; padding: 14px 16px; border-right: 1px solid #e8e8e8; display: flex; flex-direction: column; justify-content: center; }
  .ph-time .month { font-size: 13px; font-weight: 500; }
  .ph-time .season { font-size: 11px; margin-top: 4px; }
  .season-peak { color: #27500A; font-weight: 500; }
  .season-low { color: #791F1F; }
  .season-warm { color: #854F0B; }
  .ph-funcs { padding: 14px 16px; display: flex; flex-direction: column; justify-content: center; }
  .ph-funcs .func-line { font-size: 13px; font-weight: 500; white-space: pre-line; line-height: 1.5; }
  .ph-funcs .badges { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
  .ph-kw { padding: 14px 16px; border-left: 1px solid #e8e8e8; font-size: 11px; color: #666; display: flex; flex-direction: column; justify-content: center; line-height: 1.7; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
  .bg-p1 { background: #EEEDFE; color: #3C3489; }
  .bg-p2 { background: #E1F5EE; color: #085041; }
  .bg-p3 { background: #E6F1FB; color: #0C447C; }
  .bg-fast { background: #FAEEDA; color: #633806; }
  .bg-ops { background: #F1EFE8; color: #444441; }
  .period-body { display: none; border-top: 1px solid #e8e8e8; padding: 16px; background: #fff; }
  .period-body.open { display: block; }
  .body-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .body-card { background: #f8f8f6; border-radius: 8px; padding: 12px 14px; }
  .body-card h4 { font-size: 11px; font-weight: 500; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .body-card p { font-size: 12px; color: #1a1a1a; line-height: 1.7; white-space: pre-wrap; }
  .toggle-hint { font-size: 11px; color: #bbb; padding: 0 16px; display: flex; align-items: center; }
  @media(max-width:600px) {
    .period-header { grid-template-columns: 1fr; }
    .ph-kw { display: none; }
    .body-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

    goal:'AI Notes核心词排名提升 / Compress类流量维稳',
    highlight:false,

const cal = document.getElementById('calendar');
periods.forEach((p, i) => {
  const row = document.createElement('div');
  row.className = 'period-row' + (p.highlight?' highlight':'');

  const badges = p.badges.map(b=>`<span class="badge ${b.c}">${b.t}</span>`).join('');
  const kwHtml = p.kw.split('\n').map(k=>`<span style="display:block">${k}</span>`).join('');

  row.innerHTML = `
    <div class="period-header" onclick="toggle(${i})">
      <div class="ph-time">
        <span class="month">${p.time}</span>
        <span class="season ${p.seasonClass}">${p.season}</span>
      </div>
      <div class="ph-funcs">
        <div class="func-line">${p.funcs}</div>
        <div class="badges">${badges}</div>
      </div>
      <div class="ph-kw">${kwHtml}</div>
    </div>
    <div class="period-body" id="body-${i}">
      <div class="body-grid">
        <div class="body-card" style="grid-column:span 2"><h4>核心动作</h4><p>${p.actions}</p></div>
        <div class="body-card"><h4>主要渠道</h4><p>${p.channels}</p></div>
        <div class="body-card"><h4>阶段目标</h4><p>${p.goal}</p></div>
      </div>
    </div>
  `;
  cal.appendChild(row);
});

function toggle(i) {
  document.getElementById('body-'+i).classList.toggle('open');
}
document.getElementById('body-0').classList.add('open');
document.getElementById('body-3').classList.add('open');

</body>
</html>
